name: Build and Test

on:
  push:
    branches: [ main, develop, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on Bun
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Lint
      run: bun run lint

    - name: Smoke CLI
      run: |
        bun run bin/canvas.js --version
        bun run bin/canvas.js --help
        bun run bin/canvas.js config path

  build-all:
    name: Build all platforms
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Build all platforms
      run: |
        mkdir -p dist
        bun run build:linux
        bun run build:linux-arm
        bun run build:macos
        bun run build:macos-arm
        bun run build:windows

    - name: Smoke Linux binary
      run: |
        ./dist/canvas-linux --version
        ./dist/canvas-linux --help

    - uses: actions/upload-artifact@v4
      with:
        name: canvas-cli-binaries
        path: |
          dist/canvas-linux
          dist/canvas-linux-arm
          dist/canvas-macos
          dist/canvas-macos-arm
          dist/canvas-windows.exe
        retention-days: 7
