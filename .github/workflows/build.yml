name: Build and Test

on:
  push:
    branches: [ main, develop, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on Bun
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Lint
      run: bun run lint

    - name: Smoke CLI
      run: |
        bun run bin/canvas.js --version
        bun run bin/canvas.js --help
        bun run bin/canvas.js config path

  build-dev:
    name: Build dev binary
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Build
      run: bun run build:dev

    - name: Smoke binary
      run: |
        ./dist/canvas-dev --version
        ./dist/canvas-dev --help

    - uses: actions/upload-artifact@v4
      with:
        name: canvas-dev-linux
        path: dist/canvas-dev
        retention-days: 7
