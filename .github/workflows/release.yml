name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Extract version
      id: ver
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Stamp version in package.json
      run: |
        node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
          pkg.version = '${{ steps.ver.outputs.version }}';
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
        "

    - name: Build all platforms
      run: |
        mkdir -p dist
        bun run build:linux
        bun run build:linux-arm
        bun run build:macos
        bun run build:macos-arm
        bun run build:windows

    - name: Smoke Linux binary
      run: |
        ./dist/canvas-linux --version
        ./dist/canvas-linux --help

    - name: Package release assets
      run: |
        V=${{ steps.ver.outputs.version }}
        mkdir -p release-assets
        cp dist/canvas-linux       release-assets/canvas-linux-x64
        cp dist/canvas-linux-arm   release-assets/canvas-linux-arm64
        cp dist/canvas-macos       release-assets/canvas-macos-x64
        cp dist/canvas-macos-arm   release-assets/canvas-macos-arm64
        cp dist/canvas-windows.exe release-assets/canvas-windows-x64.exe
        cd release-assets
        tar -czf canvas-${V}-linux-x64.tar.gz    canvas-linux-x64
        tar -czf canvas-${V}-linux-arm64.tar.gz  canvas-linux-arm64
        tar -czf canvas-${V}-macos-x64.tar.gz    canvas-macos-x64
        tar -czf canvas-${V}-macos-arm64.tar.gz  canvas-macos-arm64
        zip      canvas-${V}-windows-x64.zip     canvas-windows-x64.exe
        sha256sum *.tar.gz *.zip > checksums.txt

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.ver.outputs.tag }}
        name: Canvas CLI ${{ steps.ver.outputs.tag }}
        draft: false
        prerelease: ${{ contains(steps.ver.outputs.version, '-') }}
        generate_release_notes: true
        files: |
          release-assets/*.tar.gz
          release-assets/*.zip
          release-assets/checksums.txt
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Prune old releases (keep 5)
      run: |
        gh release list --limit 100 --json tagName,createdAt \
          --jq 'sort_by(.createdAt) | reverse | .[5:] | .[].tagName' \
          | xargs -I{} gh release delete {} --yes --cleanup-tag 2>/dev/null || true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
